services:
  postgres:
    image: postgres:16-alpine
    container_name: pruma_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pruma
      POSTGRES_PASSWORD: pruma
      POSTGRES_DB: pruma_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: pruma_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: pruma_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/pruma-dev;
        mc anonymous set none local/pruma-dev;
        echo 'MinIO bucket pruma-dev ready';
      "

volumes:
  postgres_data:
  minio_data:
