name: CI

on:
  push:
    branches: [master, production]
  pull_request:
    branches: [master, production]

defaults:
  run:
    working-directory: apps/web

jobs:
  # ── 1. Tests ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - run: npm test -- --run

  # ── 2. Build (type check + Next.js bundle) ──────────────────────────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://user:pass@localhost/placeholder"
      AUTH_SECRET: "ci-placeholder-secret-must-be-32-chars-long"
      AUTH_GOOGLE_ID: "placeholder"
      AUTH_GOOGLE_SECRET: "placeholder"
      N8N_WEBHOOK_SECRET: "placeholder"
      ASAAS_API_KEY: "placeholder"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - run: npm run build

  # ── 3. Validate migrations (PRs e pushes em ambas as branches) ──────────────
  validate-migrations:
    name: Validate Migrations
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate migration journal
        run: |
          missing=0
          for f in db/migrations/*.sql; do
            tag=$(basename "$f" .sql)
            if ! grep -q "\"$tag\"" db/migrations/meta/_journal.json; then
              echo "ERROR: $tag exists as SQL but is not registered in _journal.json"
              missing=1
            fi
          done
          [ $missing -eq 0 ] || exit 1

      - name: Validate migration statement-breakpoints
        run: |
          invalid=0
          for f in db/migrations/*.sql; do
            stmt_count=$(grep -cE '^(ALTER|CREATE|DROP|INSERT|UPDATE|DELETE|GRANT|REVOKE) ' "$f" || true)
            bp_count=$(grep -c 'statement-breakpoint' "$f" || true)
            if [ "$stmt_count" -gt 1 ] && [ "$bp_count" -lt $((stmt_count - 1)) ]; then
              echo "ERROR: $(basename $f) has $stmt_count statements but only $bp_count --> statement-breakpoint markers"
              echo "  Neon HTTP driver rejects multiple commands without breakpoints."
              echo "  Use: npx drizzle-kit generate (never write migration SQL manually)"
              invalid=1
            fi
          done
          [ $invalid -eq 0 ] || exit 1

  # ── 4a. Staging deploy (push para master) ───────────────────────────────────
  # Requer secrets no GitHub Environment "staging":
  #   NEON_API_KEY           — mesmo do prod
  #   NEON_STAGING_BRANCH_ID — branch ID do branch "staging" no Neon console
  #   DATABASE_URL_STAGING   — connection string do Neon branch staging
  #   VERCEL_TOKEN           — mesmo do prod
  deploy-staging:
    name: Migrate & Deploy → Staging
    needs: validate-migrations
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 20
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - name: Create Neon preview branch from staging
        id: neon-branch
        run: |
          response=$(curl -sf -X POST \
            "https://console.neon.tech/api/v2/projects/wild-shape-63460566/branches" \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":{\"name\":\"ci-staging-${{ github.run_id }}\",\"parent_id\":\"${{ secrets.NEON_STAGING_BRANCH_ID }}\"},\"endpoints\":[{\"type\":\"read_write\"}]}")
          branch_id=$(echo "$response" | jq -r '.branch.id')
          if [ -z "$branch_id" ] || [ "$branch_id" = "null" ]; then
            echo "ERROR: Neon branch creation failed. Response: $response"
            exit 1
          fi
          echo "branch_id=$branch_id" >> $GITHUB_OUTPUT
          # Wait for endpoint to be ready (Neon cold-start up to 5s)
          sleep 5
          conn=$(curl -sf \
            "https://console.neon.tech/api/v2/projects/wild-shape-63460566/connection_uri?branch_id=$branch_id&database_name=neondb&role_name=neondb_owner" \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}")
          db_url=$(echo "$conn" | jq -r '.uri')
          if [ -z "$db_url" ] || [ "$db_url" = "null" ]; then
            echo "ERROR: Failed to get connection URI for branch $branch_id"
            exit 1
          fi
          echo "db_url=$db_url" >> $GITHUB_OUTPUT

      - name: Test migrations on Neon preview (staging base)
        run: npx tsx scripts/migrate.ts
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}

      - name: Delete Neon preview branch
        if: always()
        run: |
          if [ -n "${{ steps.neon-branch.outputs.branch_id }}" ] && [ "${{ steps.neon-branch.outputs.branch_id }}" != "null" ]; then
            curl -sf -X DELETE \
              "https://console.neon.tech/api/v2/projects/wild-shape-63460566/branches/${{ steps.neon-branch.outputs.branch_id }}" \
              -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}"
          fi

      - name: Run migrations on staging DB
        run: npx tsx scripts/migrate.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}

      - name: Deploy to Vercel (staging preview)
        working-directory: ${{ github.workspace }}
        run: npx vercel deploy --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_CisLLmpWltH87v1CVgGNdqSc
          VERCEL_PROJECT_ID: prj_uipbuzcH6Hse0BE2hIpzlRuAwPlY

  # ── 4b. Production deploy (push para production) ────────────────────────────
  deploy-production:
    name: Migrate & Deploy → Production
    needs: validate-migrations
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - name: Create Neon preview branch from main (prod base)
        id: neon-branch
        run: |
          response=$(curl -sf -X POST \
            "https://console.neon.tech/api/v2/projects/wild-shape-63460566/branches" \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":{\"name\":\"ci-prod-${{ github.run_id }}\"},\"endpoints\":[{\"type\":\"read_write\"}]}")
          branch_id=$(echo "$response" | jq -r '.branch.id')
          if [ -z "$branch_id" ] || [ "$branch_id" = "null" ]; then
            echo "ERROR: Neon branch creation failed. Response: $response"
            exit 1
          fi
          echo "branch_id=$branch_id" >> $GITHUB_OUTPUT
          # Wait for endpoint to be ready (Neon cold-start up to 5s)
          sleep 5
          conn=$(curl -sf \
            "https://console.neon.tech/api/v2/projects/wild-shape-63460566/connection_uri?branch_id=$branch_id&database_name=neondb&role_name=neondb_owner" \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}")
          db_url=$(echo "$conn" | jq -r '.uri')
          if [ -z "$db_url" ] || [ "$db_url" = "null" ]; then
            echo "ERROR: Failed to get connection URI for branch $branch_id"
            exit 1
          fi
          echo "db_url=$db_url" >> $GITHUB_OUTPUT

      - name: Test migrations on Neon preview (prod base)
        run: npx tsx scripts/migrate.ts
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}

      - name: Delete Neon preview branch
        if: always()
        run: |
          if [ -n "${{ steps.neon-branch.outputs.branch_id }}" ] && [ "${{ steps.neon-branch.outputs.branch_id }}" != "null" ]; then
            curl -sf -X DELETE \
              "https://console.neon.tech/api/v2/projects/wild-shape-63460566/branches/${{ steps.neon-branch.outputs.branch_id }}" \
              -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}"
          fi

      - name: Run Drizzle migrations on production
        run: npx tsx scripts/migrate.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Vercel (production)
        working-directory: ${{ github.workspace }}
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_CisLLmpWltH87v1CVgGNdqSc
          VERCEL_PROJECT_ID: prj_uipbuzcH6Hse0BE2hIpzlRuAwPlY
