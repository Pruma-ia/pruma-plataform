name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    working-directory: apps/web

jobs:
  # ── 1. Tests ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - run: npm test -- --run

  # ── 2. Build (type check + Next.js bundle) ──────────────────────────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    env:
      # Placeholders para satisfazer validações em tempo de build.
      # Nenhum valor real é necessário — nenhuma rota é executada durante o build.
      DATABASE_URL: "postgresql://user:pass@localhost/placeholder"
      AUTH_SECRET: "ci-placeholder-secret-must-be-32-chars-long"
      AUTH_GOOGLE_ID: "placeholder"
      AUTH_GOOGLE_SECRET: "placeholder"
      N8N_WEBHOOK_SECRET: "placeholder"
      ASAAS_API_KEY: "placeholder"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - run: npm run build

  # ── 3. Migrate + Deploy (somente em merge para main/master) ─────────────────
  deploy:
    name: Migrate & Deploy
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - name: Validate migration journal
        run: |
          missing=0
          for f in db/migrations/*.sql; do
            tag=$(basename "$f" .sql)
            if ! grep -q "\"$tag\"" db/migrations/meta/_journal.json; then
              echo "ERROR: $tag exists as SQL but is not registered in _journal.json"
              missing=1
            fi
          done
          [ $missing -eq 0 ] || exit 1

      - name: Run Drizzle migrations
        run: npx tsx scripts/migrate.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Vercel (após migration)
        working-directory: ${{ github.workspace }}
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_CisLLmpWltH87v1CVgGNdqSc
          VERCEL_PROJECT_ID: prj_uipbuzcH6Hse0BE2hIpzlRuAwPlY

