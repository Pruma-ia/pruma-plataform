services:
  postgres:
    image: postgres:16-alpine
    container_name: pruma_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pruma
      POSTGRES_PASSWORD: pruma
      POSTGRES_DB: pruma_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
